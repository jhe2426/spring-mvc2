# 스프링은 타입 오류가 발생하면 직접 검증 오류에 추가를 해주는데 에러 코드로 typeMismatch라는 오류 코드를 사용한다.
# 그래서 price필드에 타입 에러를 발생시키면 스프링은 typeMismatch라는 오류 코드를 사용하므로 MessageCodeResolver가
# typeMismatch.item.price, typeMismatch.price, typeMismatch.java.lang.Integer, typeMismatch 이렇게 4가지의 에러 메시지를 생성해준다.
typeMismatch.java.lang.Integer=숫자를 입력해주세요.
typeMismatch=타입 오류입니다.

# Bean Validation 추가
# {0}은 필드명이고, {1}, {2}은 각 애노테이션마다 다르다.
# BeanValidation 메시지 찾는 순서
    # 1. 생성된 메시지 코드 순서대로 messageSource에서 메시지 찾기
    # 2. 애노테이션의 message 속성 사용 -> @NotBlank(message = "공백! {0}")
    # 3. 라이브러리가 제공하는 기본 값 사용 -> 공백일 수 없습니다.

