<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link th:href="@{/css/bootstrap.min.css}"
          href="../css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 560px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="py-5 text-center">
        <h2>상품 등록 폼</h2>
    </div>

    <!--  th:object="${item}": <form>에서 사용할 객체를 지정, 선택 변수 식 *{...}을 적용할 수 있음  -->
    <form action="item.html" th:action th:object="${item}" method="post">
        <div>
            <label for="itemName">상품명</label>
            <!--
                th:field는 id, name, value 속성을 모두 자동으로 만들어준다.
                *{itemName} == ${item.itemName}
                th:field="*{itemName}" 이렇게 작성을 해주면 나중에 렌더링이 될 때 자동으로 id="itemName" name="itemName"로 지정을 해줌
                    그래서 id="itemName" name="itemName"는 생략이 가능해짐 (th:field="${item.itemName}"으로 작성해도 id, name을 자동으로 지정해줌)
                    id, name: th:field에서 지정한 변수 이름과 같음
                    value: th:field에서 지정한 변수의 값을 사용
            -->
            <input type="text" th:field="*{itemName}" class="form-control" placeholder="이름을 입력하세요">
        </div>
        <div>
            <label for="price">가격</label>
            <input type="text" th:field="*{price}" class="form-control" placeholder="가격을 입력하세요">
        </div>
        <div>
            <label for="quantity">수량</label>
            <input type="text" th:field="*{quantity}" class="form-control" placeholder="수량을 입력하세요">
        </div>

        <hr class="my-4">

        <!-- single checkbox -->
        <!--
            체크 박스를 체크하면 HTML Form에서 'open=on'이라는 값을 스프링으로 넘기게 된다. 이때 스프링은 'on'이라는 문자를 'true'타입으로 변환해준다.
            주위 - 체크 박스를 선택하지 않는 경우
                HTML에서 체크 박스를 선택하지 않고 폼을 전송하면 'open'이라는 필드 자체가 서버로 전송되지 않는다.
            HTML checkbox는 선택이 안되면 클라이언트에서 서버로 값 자체를 보내지 않는다. 저장할 경우에는 체크박스가 넘어오지 않아서 null 값이면 선택되지
            않았다라고 저장을 하면되는데 수정을 할 경우에 이 방식이 문제가 될 수 있다. 사용자가 의도적으로 체크되어 있던 값을 해제해도 저장시 아무 값도
            넘어가지 않기 때문에, 서버 구현에 따라서 값이 오지 않은 것(해당 체크박스는 수정이 되지 않은 값으로 인식해서)으로 판단해서 값을 변경하지 않을 수도 있다.
                왜냐하면 수정할 경우에는 수정된 값들만 넘겨주기 떄문에 이 체크박스 해제를 해서 변경이 발생했더라도 값이 못 넘어오기 때문에
                서버 입장에서는 체크 박스는 수정이 안 되었구나라고 착각을 할 수 있게 된다.
                물론 서버에서 처리를 checkbox에 null 값이 넘어오면 체크를 안 한것으로 코드를 작성해주면 문제가 발생되지는 않는다.
                그래서 서버 구현에 따라서 값이 오지 않은 것으로 판단해서 값을 변경하지 않을 수도 있어 문제가 발생할 수 있다.

            위와 같은 문제를 해결하기 위해서 스프링 MVC는 약간의 트릭을 사용하는데, 히든 필드를 하나 만들어서, '_open'처럼 기존 체크 박스 이름 앞에
            언더스코어('_')를 붙여서 전송하면 체크를 해제했다고 인식할 수 있다. 히든 필드는 항상 전송된다. 따라서 체크를 해제한 경우 'open'은 전송되지 않고,
            '_open'만 전송되는데, 이 경우 스프링 MVC는 체크를 해제했다고 판단한다.

            체크 박스 체크
            open=on&_open=on
            체크 박스를 체크하면 스프링 MVC가 'open' 값이 있는 것을 확인하고 사용한다. 이때 '_open'은 무시한다.

            체크 박스 미체크
            _open=on
            체크 박스를 체크하지 않으면 스프링 MVC가 '_open'만 있는 것을 확인하고, 'open'의 값이 체크되지 않았다고 인식한다.
            그래서 이 경우 서버에서 Boolean 타입을 찍어보면 결과가 null이 아니라 false인 것을 확인할 수 있다.
        -->
<!--
    <div>판매 여부</div>
        <div>
            <div class="form-check">
                <input type="checkbox" id="open" name="open" class="form-check-input">
                <input type="hidden" name="_open" value="on"/> &lt;!&ndash; 히든 필드 추가 &ndash;&gt;
                <label for="open" class="form-check-label">판매 오픈</label>
            </div>
        </div>
-->

        <!-- single checkbox -->
        <!--
           th:field="*{open}" 이렇게 타임리프를 사용하면 타임리프가 자동으로 <input type="hidden" name="_open" value="on"/> 코드를
            자동으로 생성해주어 편리하게 체크박스의 선택, 해제의 값을 받아올 수 있게 된다.
        -->
        <div>판매 여부</div>
        <div>
            <div class="form-check">
                <input type="checkbox" id="open" th:field="*{open}" class="form-check-input">
                <label for="open" class="form-check-label">판매 오픈</label>
            </div>
        </div>

        <!-- multi checkbox -->
        <div>
            <div>등록 지역</div>
            <div th:each="region : ${regions}" class="form-check form-check-inline">
                <!--
                    th:field="*{regions}" == th:field="${item.regions}
                    타임리프 th:field="*{regions}" 이 코드를 작성 덕분에 지역을 하나도 체크하지 않아도 자동으로
                    <input type="hidden" name="_regions" value="on"/> 코드를 작성해주므로 클라이언트가 서버에 아무런 데이터를 보내지 않는 것을
                    방지해준다. 참고로 _regions 조차 보내지 않으면 결과는 item.regions=[]처럼 빈 배열 값이 넘오는 것이 아니라 null이 넘어오게 된다.
                -->
                <input type="checkbox" th:field="*{regions}" th:value="${region.key}" class="form-check-input">
                <!--
                    타임리프는 동적으로 id가 생성될 때 해당 id값을 사용할 수 있게 하도록 #ids,prev(...), ids.next(...)와 같은 기능을 제공해준다.
                    th:for="${#ids.prev('regions')}" 이렇게 작성하게 되면 th:field="*{regions}"를 통해서 자동으로 생성되는 아이디를 가져와서
                    ${#ids.prev('regions')}에 해당 id 값을 넣어준다.
                -->
                <label th:for="${#ids.prev('regions')}"
                       th:text="${region.value}" class="form-check-label">서울</label>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <button class="w-100 btn btn-primary btn-lg" type="submit">상품 등록</button>
            </div>
            <div class="col">
                <button class="w-100 btn btn-secondary btn-lg"
                        onclick="location.href='items.html'"
                        th:onclick="|location.href='@{/form/items}'|"
                        type="button">취소</button>
            </div>
        </div>

    </form>

</div> <!-- /container -->
</body>
</html>
